name: Setup Rust
description: Install the Rust toolchain declared in rust-toolchain.toml.

inputs:
  components:
    description: Comma-separated Rust components to install.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Resolve Rust toolchain
      id: rust-toolchain
      shell: bash
      run: |
        channel="$(sed -n 's/^channel = "\(.*\)"/\1/p' rust-toolchain.toml)"
        echo "channel=$channel" >> "$GITHUB_OUTPUT"

    - uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ steps.rust-toolchain.outputs.channel }}
        components: ${{ inputs.components }}
