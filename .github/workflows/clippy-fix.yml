name: Clippy Fix

on:
  workflow_call:
    inputs:
      commit_changes:
        description: "Commit and push fixes to the selected branch"
        required: false
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      commit_changes:
        description: "Commit and push fixes to the selected branch"
        required: true
        type: boolean
        default: true

concurrency:
  group: clippy-fix-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always
  CARGO_FIXIT_VERSION: "0.1.1"

jobs:
  clippy-fix:
    name: cargo fixit --clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libwebkit2gtk-4.1-dev libudev-dev
          version: 1.0

      - uses: ./.github/actions/setup-rust
        with:
          components: clippy, rustfmt

      - uses: swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Cache cargo-fixit
        id: cache-cargo-fixit
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-fixit
          key: cargo-fixit-${{ runner.os }}-${{ runner.arch }}-${{ env.CARGO_FIXIT_VERSION }}

      - name: Install cargo-fixit
        if: steps.cache-cargo-fixit.outputs.cache-hit != 'true'
        run: cargo install cargo-fixit --version "$CARGO_FIXIT_VERSION" --locked

      - name: Apply Clippy machine-applicable fixes
        run: cargo fixit --clippy --workspace --all-targets --all-features --allow-dirty --allow-staged

      - name: Format fixed files
        run: cargo fmt

      - name: Show diff
        run: git diff --stat

      - name: Resolve GitHub Actions bot identity
        if: ${{ inputs.commit_changes }}
        run: |
          BOT_LOGIN="github-actions[bot]"
          BOT_ID="$(curl -fsSL https://api.github.com/users/github-actions%5Bbot%5D | python3 -c 'import json, sys; print(json.load(sys.stdin)["id"])')"

          echo "GIT_AUTHOR_NAME=$BOT_LOGIN" >> "$GITHUB_ENV"
          echo "GIT_AUTHOR_EMAIL=${BOT_ID}+${BOT_LOGIN}@users.noreply.github.com" >> "$GITHUB_ENV"

      - name: Commit fixes
        if: ${{ inputs.commit_changes }}
        run: |
          if git diff --quiet; then
            echo "No Clippy fixes to commit."
            exit 0
          fi

          git config user.name "$GIT_AUTHOR_NAME"
          git config user.email "$GIT_AUTHOR_EMAIL"
          git add .
          git commit -m "chore: apply clippy fixes"
          git push
