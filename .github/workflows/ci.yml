name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_FIXIT_VERSION: "0.1.1"
  CARGO_INCREMENTAL: "0"
  CARGO_TERM_COLOR: always

jobs:
  formatting:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Ensure rustfmt is installed and setup problem matcher
      - uses: ./.github/actions/setup-rust
        with:
          components: rustfmt
      - name: Rustfmt Check
        uses: actions-rust-lang/rustfmt@v1

  linting:
    name: cargo fixit
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0

      - uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libwebkit2gtk-4.1-dev libudev-dev
          version: 1.0

      - uses: ./.github/actions/setup-rust
        with:
          components: clippy, rustfmt

      - uses: swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Cache cargo-fixit
        id: cache-cargo-fixit
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-fixit
          key: cargo-fixit-${{ runner.os }}-${{ runner.arch }}-${{ env.CARGO_FIXIT_VERSION }}

      - name: Install cargo-fixit
        if: steps.cache-cargo-fixit.outputs.cache-hit != 'true'
        run: cargo +"$RUST_TOOLCHAIN_CHANNEL" install cargo-fixit --version "$CARGO_FIXIT_VERSION" --locked

      - name: Apply Clippy machine-applicable fixes
        id: cargo-fixit
        continue-on-error: true
        run: |
          set +e
          cargo +"$RUST_TOOLCHAIN_CHANNEL" fixit \
            --color always \
            --clippy \
            --workspace \
            --allow-dirty \
            --allow-staged \
            --broken-code \
            --all-features \
            --all-targets \
            > >(tee cargo-fixit.log) \
            2> >(tee -a cargo-fixit.log >&2)
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Format fixed files
        run: cargo fmt

      - name: Show diff
        run: git diff --stat

      - name: Resolve GitHub Actions bot identity
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        run: |
          BOT_LOGIN="github-actions[bot]"
          BOT_ID="$(curl -fsSL https://api.github.com/users/github-actions%5Bbot%5D | python3 -c 'import json, sys; print(json.load(sys.stdin)["id"])')"

          echo "GIT_AUTHOR_NAME=$BOT_LOGIN" >> "$GITHUB_ENV"
          echo "GIT_AUTHOR_EMAIL=${BOT_ID}+${BOT_LOGIN}@users.noreply.github.com" >> "$GITHUB_ENV"

      - name: Commit fixes
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        run: |
          if git diff --quiet; then
            echo "No Clippy fixes to commit."
            exit 0
          fi

          git config user.name "$GIT_AUTHOR_NAME"
          git config user.email "$GIT_AUTHOR_EMAIL"
          git add .
          git commit -m "chore: apply clippy fixes"
          git push

      - name: Fail on remaining Rust diagnostics
        run: |
          if grep -E '^(warning|error)(\[[^]]+\])?:' cargo-fixit.log; then
            exit 1
          fi

          exit "${{ steps.cargo-fixit.outputs.status }}"

  testing:
    name: cargo nextest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libwebkit2gtk-4.1-dev libudev-dev
          version: 1.0

      - uses: ./.github/actions/setup-rust

      - uses: swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - run: cargo nextest run --workspace --all-features --profile ci
